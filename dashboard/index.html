<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本事多媒體 — AI Agent Office</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');

:root {
  --bg: #0f0e1a;
  --floor: #1a1830;
  --panel: #13122a;
  --border: #2d2b5e;
  --text: #e0dff0;
  --dim: #7878a8;
  --accent: #ffd700;
  --green: #3ddc84;
  --red: #ff6b6b;
  --blue: #5dadec;
  --purple: #b48eda;
  --orange: #f9a825;
  --pink: #f06292;
  --wood: #8b6914;
  --woodDark: #5a4510;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Press Start 2P', 'DotGothic16', monospace;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* Scanlines */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 6px);
  pointer-events: none; z-index: 9999;
}

/* ══ HEADER ══ */
.header {
  background: linear-gradient(180deg, #18163a, var(--panel));
  border-bottom: 3px solid var(--border);
  padding: 10px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 48px;
  position: relative;
  z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo-icon { font-size: 20px; filter: drop-shadow(0 0 6px rgba(255,215,0,0.5)); }
.header h1 { font-size: 13px; color: var(--accent); text-shadow: 0 0 8px rgba(255,215,0,0.3); }
.header h1 .sub { color: var(--dim); font-size: 9px; margin-left: 8px; }
.header-right { font-size: 9px; color: var(--dim); text-align: right; line-height: 1.8; }
.header-right .time { color: var(--green); font-size: 12px; font-variant-numeric: tabular-nums; }

/* ══ MAIN ══ */
.main {
  display: grid;
  grid-template-columns: 1fr 360px;
  height: calc(100vh - 48px);
}

/* ══ OFFICE ══ */
.office {
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse at 50% 40%, #1e1c3a 0%, var(--bg) 80%);
}

/* Floor tiles */
.floor {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(45,43,94,0.2) 1px, transparent 1px),
    linear-gradient(90deg, rgba(45,43,94,0.2) 1px, transparent 1px);
  background-size: 48px 48px;
  opacity: 0.6;
}

/* Walls */
.wall-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 60px;
  background: linear-gradient(180deg, #252348, transparent);
}

/* ══ DESK ══ */
.desk {
  position: absolute;
  z-index: 10;
  cursor: pointer;
  transition: filter 0.3s;
}
.desk:hover { filter: brightness(1.15); z-index: 20; }

.desk-body {
  width: 160px; height: 90px;
  background: linear-gradient(145deg, #9a7830, #6b5020);
  border: 3px solid #b8903a;
  border-radius: 6px;
  position: relative;
  box-shadow:
    0 6px 20px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.1);
}

/* Monitor on desk */
.monitor {
  position: absolute;
  top: 6px; left: 50%; transform: translateX(-50%);
  width: 60px; height: 40px;
  background: #111;
  border: 2px solid #333;
  border-radius: 3px;
  overflow: hidden;
}
.monitor-screen {
  width: 100%; height: 100%;
  background: #0a0a1a;
  display: flex; align-items: center; justify-content: center;
  font-size: 6px; color: var(--dim);
  transition: all 0.5s;
}
.monitor-screen.on {
  background: linear-gradient(135deg, #0a2a1a, #0a1a2a);
  color: var(--green);
  box-shadow: inset 0 0 10px rgba(61,220,132,0.2);
}

/* Lamp */
.lamp {
  position: absolute;
  top: -4px; right: 14px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #333;
  border: 2px solid #555;
  transition: all 0.5s;
}
.lamp.on {
  background: #ffee88;
  border-color: #ffd700;
  box-shadow:
    0 0 12px rgba(255,238,136,0.8),
    0 0 30px rgba(255,215,0,0.4),
    0 20px 40px rgba(255,215,0,0.15);
}

/* Name plate */
.nameplate {
  text-align: center;
  margin-top: 8px;
  font-size: 9px;
  color: var(--dim);
  text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  transition: color 0.3s;
  white-space: nowrap;
}
.desk:hover .nameplate, .desk.working .nameplate { color: var(--accent); }

/* Task bubble */
.bubble {
  position: absolute;
  bottom: 100%;
  left: 50%; transform: translateX(-50%);
  background: rgba(19,18,42,0.95);
  border: 2px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 8px;
  white-space: nowrap;
  margin-bottom: 8px;
  opacity: 0;
  transition: opacity 0.4s, transform 0.4s;
  transform: translateX(-50%) translateY(4px);
  pointer-events: none;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.desk.working .bubble {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.bubble::after {
  content: '';
  position: absolute;
  top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: var(--border);
}

/* ══ MEETING TABLE ══ */
.meeting {
  position: absolute;
  left: 50%; top: 52%;
  transform: translate(-50%, -50%);
  width: 220px; height: 140px;
  background: linear-gradient(145deg, #6b5020, #4a3510);
  border: 4px solid #b8903a;
  border-radius: 12px;
  box-shadow:
    0 8px 32px rgba(0,0,0,0.7),
    inset 0 2px 0 rgba(255,255,255,0.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 8;
  transition: all 0.5s;
}
.meeting-label {
  font-size: 9px;
  color: var(--dim);
  transition: color 0.3s;
}
.meeting.active {
  border-color: var(--accent);
  box-shadow:
    0 0 30px rgba(255,215,0,0.3),
    0 8px 32px rgba(0,0,0,0.7);
}
.meeting.active .meeting-label { color: var(--accent); }

/* Seats around meeting table */
.seat {
  position: absolute;
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--panel);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.5s;
}
.meeting.active .seat { opacity: 1; }
.seat:nth-child(2) { top: -24px; left: 50%; transform: translateX(-50%); }
.seat:nth-child(3) { top: 10px; right: -24px; }
.seat:nth-child(4) { bottom: 10px; right: -24px; }
.seat:nth-child(5) { bottom: -24px; left: 50%; transform: translateX(-50%); }
.seat:nth-child(6) { bottom: 10px; left: -24px; }
.seat:nth-child(7) { top: 10px; left: -24px; }

/* ══ PIXEL CHARACTER ══ */
.char-container {
  position: absolute;
  bottom: 8px; left: 50%;
  transform: translateX(-50%);
  z-index: 5;
}
.char-canvas {
  image-rendering: pixelated;
  width: 64px; height: 88px;
}

/* Idle animation: breathing */
@keyframes breathe {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-2px); }
}
.desk:not(.working) .char-container {
  animation: breathe 3s ease-in-out infinite;
}

/* Working animation: slight bounce */
@keyframes workBounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  25% { transform: translateX(-50%) translateY(-3px) rotate(-1deg); }
  75% { transform: translateX(-50%) translateY(-1px) rotate(1deg); }
}
.desk.working .char-container {
  animation: workBounce 1.5s ease-in-out infinite;
}

/* ══ PARTICLES ══ */
.particle {
  position: absolute;
  pointer-events: none;
  z-index: 100;
}

.particle-fireball {
  font-size: 28px;
  animation: fireball 1.2s ease-out forwards;
}
@keyframes fireball {
  0% { opacity: 0; transform: scale(0.2) rotate(0deg); filter: blur(2px); }
  20% { opacity: 1; transform: scale(1.3) rotate(180deg); filter: blur(0); }
  60% { transform: scale(1) rotate(360deg); }
  100% { opacity: 0; transform: scale(0.6) rotate(540deg) translateY(-20px); }
}

.particle-pigeon {
  font-size: 24px;
  animation: pigeon 2.5s ease-in-out forwards;
}
@keyframes pigeon {
  0% { opacity: 0; transform: scaleX(-1) translateX(-60px); }
  15% { opacity: 1; }
  50% { transform: scaleX(-1) translateX(80px) translateY(-30px); }
  85% { opacity: 1; }
  100% { opacity: 0; transform: scaleX(-1) translateX(200px) translateY(-50px); }
}

.particle-sparkle {
  font-size: 20px;
  animation: sparkle 0.8s ease-out forwards;
}
@keyframes sparkle {
  0% { opacity: 1; transform: scale(0) rotate(0deg); }
  50% { opacity: 1; transform: scale(1.6) rotate(180deg); }
  100% { opacity: 0; transform: scale(0) rotate(360deg); }
}

.particle-mail {
  font-size: 22px;
  animation: mail 1.8s ease-in-out forwards;
}
@keyframes mail {
  0% { opacity: 0; transform: scale(0.3) translateY(10px); }
  15% { opacity: 1; transform: scale(1.1) translateY(0); }
  85% { opacity: 1; }
  100% { opacity: 0; transform: scale(0.7) translateY(-15px); }
}

.particle-star {
  font-size: 18px;
  animation: star 1s ease-out forwards;
}
@keyframes star {
  0% { opacity: 1; transform: scale(0) translateY(0); }
  40% { opacity: 1; transform: scale(1.4) translateY(-20px); }
  100% { opacity: 0; transform: scale(0.5) translateY(-50px); }
}

/* ══ SIDE PANEL ══ */
.panel {
  background: var(--panel);
  border-left: 3px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.tabs {
  display: flex;
  border-bottom: 2px solid var(--border);
  flex-shrink: 0;
}
.tab {
  flex: 1;
  padding: 11px 4px;
  font-size: 8px;
  text-align: center;
  color: var(--dim);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
}
.tab:hover { color: var(--text); background: rgba(255,255,255,0.02); }
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: rgba(255,215,0,0.03);
}

.content {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
}
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-track { background: var(--bg); }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Cards */
.card {
  background: rgba(15,14,26,0.6);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 10px;
  font-size: 9px;
  line-height: 1.8;
  transition: border-color 0.3s;
}
.card:hover { border-color: var(--accent); }
.card-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.card-title { font-size: 10px; }
.badge {
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 7px;
  font-weight: bold;
}
.badge-active { background: rgba(61,220,132,0.15); color: var(--green); }
.badge-done { background: rgba(93,173,236,0.15); color: var(--blue); }
.badge-pending { background: rgba(249,168,37,0.15); color: var(--orange); }
.card-body { color: var(--dim); font-size: 9px; }

/* Output type tags */
.tag {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 4px;
  font-size: 7px;
  margin-right: 6px;
  vertical-align: middle;
}
.tag-copy { background: rgba(93,173,236,0.15); color: var(--blue); }
.tag-quote { background: rgba(61,220,132,0.15); color: var(--green); }
.tag-analysis { background: rgba(249,168,37,0.15); color: var(--orange); }
.tag-design { background: rgba(180,142,218,0.15); color: var(--purple); }

.card a {
  color: var(--accent);
  text-decoration: underline;
  text-underline-offset: 2px;
}
.card a:hover { color: #fff; }

/* Log */
.log-line {
  padding: 9px 0;
  border-bottom: 1px solid rgba(45,43,94,0.4);
  font-size: 9px;
  line-height: 1.6;
}
.log-time { color: var(--dim); margin-right: 8px; font-size: 8px; }
.from { color: var(--orange); }
.to { color: var(--blue); }
.arrow { color: var(--dim); margin: 0 3px; }

/* Stats */
.stats {
  display: flex;
  padding: 10px 16px;
  border-top: 2px solid var(--border);
  gap: 20px;
  font-size: 9px;
  flex-shrink: 0;
}
.stat { display: flex; align-items: center; gap: 6px; }
.dot { width: 8px; height: 8px; border-radius: 50%; }

/* ══ CEO BUTTON ══ */
.ceo-btn {
  position: fixed;
  bottom: 20px; left: 20px;
  background: linear-gradient(135deg, var(--accent), #e6b800);
  color: #000;
  border: none;
  padding: 14px 28px;
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  border-radius: 8px;
  cursor: pointer;
  z-index: 500;
  box-shadow:
    0 4px 16px rgba(255,215,0,0.4),
    0 0 0 3px rgba(255,215,0,0.1);
  transition: all 0.2s;
}
.ceo-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(255,215,0,0.5);
}
.ceo-btn:active { transform: translateY(0); }

/* ══ EMPTY STATE ══ */
.empty {
  color: var(--dim);
  font-size: 10px;
  text-align: center;
  padding: 60px 20px;
  line-height: 2;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo-icon">🏢</span>
    <h1>本事多媒體 <span class="sub">AI AGENT OFFICE</span></h1>
  </div>
  <div class="header-right">
    <div class="time" id="clock">00:00:00</div>
    <div>TEAM: 6 | ACTIVE: <span id="activeNum" style="color:var(--green)">0</span></div>
  </div>
</div>

<div class="main">
  <div class="office" id="office">
    <div class="floor"></div>
    <div class="wall-top"></div>

    <!-- Meeting Table -->
    <div class="meeting" id="meeting">
      <div class="meeting-label">📋 會議桌</div>
      <div class="seat" id="seat-0"></div>
      <div class="seat" id="seat-1"></div>
      <div class="seat" id="seat-2"></div>
      <div class="seat" id="seat-3"></div>
      <div class="seat" id="seat-4"></div>
      <div class="seat" id="seat-5"></div>
    </div>
  </div>

  <div class="panel">
    <div class="tabs">
      <div class="tab active" data-tab="tasks">📋 任務</div>
      <div class="tab" data-tab="outputs">📦 成果</div>
      <div class="tab" data-tab="comms">💬 通訊</div>
      <div class="tab" data-tab="log">📡 紀錄</div>
    </div>
    <div class="content" id="content"></div>
    <div class="stats">
      <div class="stat"><div class="dot" style="background:var(--green)"></div><span id="sWork">0</span> 工作中</div>
      <div class="stat"><div class="dot" style="background:var(--dim)"></div><span id="sIdle">6</span> 閒置</div>
      <div class="stat"><div class="dot" style="background:var(--orange)"></div><span id="sDone">0</span> 完成</div>
    </div>
  </div>
</div>

<button class="ceo-btn" onclick="window.open('http://127.0.0.1:8787','_blank')">
  💬 跟老闆 Boss 聊天
</button>

<script>
// ══════════════════════════════════════
// AGENT DEFINITIONS
// ══════════════════════════════════════
const AGENTS = [
  { id:'boss',   name:'老闆 Boss',  role:'CEO 總指揮',   emoji:'🎩', color:'#ffd700',
    pos:{left:'8%',top:'18%'},
    skin:'#f5d6a8', hair:'#2a1a0a', hat:'#ffd700', body:'#2a2a5a', accent:'#ffd700', shoes:'#1a1a1a' },
  { id:'mozi',   name:'墨子 Mozi',  role:'內容總監',     emoji:'✍️', color:'#5dadec',
    pos:{left:'68%',top:'14%'},
    skin:'#f5d6a8', hair:'#0a0a1a', hat:null, body:'#1a3a6a', accent:'#5dadec', shoes:'#2a2a2a' },
  { id:'iris',   name:'彩虹 Iris',  role:'設計師',       emoji:'🎨', color:'#b48eda',
    pos:{left:'6%',top:'68%'},
    skin:'#f5d6a8', hair:'#b48eda', hat:null, body:'#3a1a5a', accent:'#b48eda', shoes:'#2a2a2a' },
  { id:'radar',  name:'雷達 Radar', role:'行銷專員',     emoji:'🔍', color:'#f9a825',
    pos:{left:'68%',top:'65%'},
    skin:'#f5d6a8', hair:'#3a2a1a', hat:'#2a2a2a', body:'#4a3a1a', accent:'#f9a825', shoes:'#1a1a1a' },
  { id:'goldie', name:'阿金 Goldie',role:'業務專員',     emoji:'💰', color:'#3ddc84',
    pos:{left:'4%',top:'42%'},
    skin:'#f5d6a8', hair:'#0a0a0a', hat:null, body:'#0a3a2a', accent:'#3ddc84', shoes:'#2a2a2a' },
  { id:'pip',    name:'小管家 Pip', role:'行政助理',     emoji:'📋', color:'#f06292',
    pos:{left:'70%',top:'40%'},
    skin:'#f5d6a8', hair:'#6a4a2a', hat:null, body:'#4a1a3a', accent:'#f06292', shoes:'#2a2a2a' },
];

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
const state = {};
AGENTS.forEach(a => state[a.id] = { status:'idle', task:null, done: Math.floor(Math.random()*15)+3 });
let tasks=[], outputs=[], comms=[], logs=[], activeTab='tasks';

// ══════════════════════════════════════
// PIXEL ART ENGINE (FF6 style)
// ══════════════════════════════════════
function drawAgent(canvas, a, working) {
  const W=16, H=24;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const p=(x,y,c)=>{ctx.fillStyle=c;ctx.fillRect(x,y,1,1)};
  const r=(x1,y1,x2,y2,c)=>{for(let y=y1;y<=y2;y++)for(let x=x1;x<=x2;x++)p(x,y,c)};

  // Hat
  if(a.hat){r(5,0,10,0,a.hat);r(4,1,11,1,a.hat);r(4,2,11,2,a.hat);r(5,3,10,3,a.hat)}

  // Hair
  const hy=a.hat?4:1;
  r(5,hy,10,hy,a.hair);r(4,hy+1,11,hy+1,a.hair);
  p(4,hy+2,a.hair);p(11,hy+2,a.hair);

  // Face
  const fy=a.hat?6:3;
  r(5,fy,10,fy+2,a.skin);
  p(4,fy+1,a.skin);p(11,fy+1,a.skin);

  // Eyes (blink every ~4s)
  const blink = !working && Math.floor(Date.now()/1000)%4===0;
  const ec = working?'#00ff88':'#aaa';
  if(!blink){p(6,fy+1,ec);p(9,fy+1,ec)}
  else{p(6,fy+1,a.skin);p(9,fy+1,a.skin)}

  // Mouth
  if(working){p(7,fy+2,'#aa6644');p(8,fy+2,'#aa6644')}
  else{p(7,fy+2,'#888');p(8,fy+2,'#888')}

  // Body
  const by=fy+3;
  r(4,by,11,by+5,a.body);

  // Tie/Accent
  p(7,by+1,a.accent);p(8,by+1,a.accent);
  p(7,by+2,a.accent);p(8,by+2,a.accent);

  // Arms (animated when working)
  const armOff = working ? Math.floor(Date.now()/400)%2 : 0;
  p(3,by+1+armOff,a.skin);p(3,by+2,a.skin);p(3,by+3,a.skin);
  p(12,by+1-armOff,a.skin);p(12,by+2,a.skin);p(12,by+3,a.skin);

  // Tool in hand when working
  if(working){
    p(2,by+3,a.accent);p(2,by+4,a.accent);
  }

  // Belt
  r(4,by+4,11,by+4,'#222');

  // Legs
  r(5,by+5,6,by+7,'#1a1a3a');
  r(9,by+5,10,by+7,'#1a1a3a');

  // Shoes
  r(4,by+8,6,by+8,a.shoes);
  r(9,by+8,11,by+8,a.shoes);
}

// ══════════════════════════════════════
// BUILD OFFICE
// ══════════════════════════════════════
function buildOffice(){
  const office = document.getElementById('office');

  AGENTS.forEach(a=>{
    const s = state[a.id];
    const working = s.status==='working';

    const desk = document.createElement('div');
    desk.className = `desk ${working?'working':''}`;
    desk.id = `desk-${a.id}`;
    desk.style.left = a.pos.left;
    desk.style.top = a.pos.top;

    desk.innerHTML = `
      <div class="bubble">${s.task||''}</div>
      <div class="desk-body">
        <div class="lamp ${working?'on':''}"></div>
        <div class="monitor">
          <div class="monitor-screen ${working?'on':''}">${working?'▮▮▯':'·'}</div>
        </div>
        <div class="char-container">
          <canvas class="char-canvas" id="cv-${a.id}"></canvas>
        </div>
      </div>
      <div class="nameplate">${a.emoji} ${a.name}</div>
    `;
    office.appendChild(desk);

    // Draw pixel art
    requestAnimationFrame(()=>{
      const cv = document.getElementById(`cv-${a.id}`);
      if(cv) drawAgent(cv, a, working);
    });
  });

  // Redraw working agents for animation
  setInterval(()=>{
    AGENTS.forEach(a=>{
      if(state[a.id].status==='working'){
        const cv = document.getElementById(`cv-${a.id}`);
        if(cv) drawAgent(cv, a, true);
      }
    });
  }, 500);

  updateStats();
}

function updateStats(){
  let w=0, d=0;
  AGENTS.forEach(a=>{
    if(state[a.id].status==='working') w++;
    d += state[a.id].done;
  });
  document.getElementById('activeNum').textContent=w;
  document.getElementById('sWork').textContent=w;
  document.getElementById('sIdle').textContent=6-w;
  document.getElementById('sDone').textContent=d;
}

// ══════════════════════════════════════
// PARTICLES
// ══════════════════════════════════════
function emit(type, fromId, toId){
  const fe=document.getElementById(`desk-${fromId}`);
  const te=document.getElementById(`desk-${toId}`);
  if(!fe||!te) return;
  const office=document.getElementById('office');
  const or=office.getBoundingClientRect();
  const fr=fe.getBoundingClientRect();
  const tr=te.getBoundingClientRect();

  const icons={fireball:'🔥',pigeon:'🕊️',sparkle:'✨',mail:'📨',star:'⭐',sword:'⚔️'};

  const el=document.createElement('div');
  el.className=`particle particle-${type}`;
  el.textContent=icons[type]||'✨';
  el.style.left=(fr.left-or.left+fr.width/2)+'px';
  el.style.top=(fr.top-or.top)+'px';
  office.appendChild(el);
  setTimeout(()=>el.remove(),2500);
}
const randParticle=()=>['fireball','pigeon','sparkle','mail','star','sword'][Math.floor(Math.random()*6)];

function startMeeting(reason){
  const m=document.getElementById('meeting');
  m.classList.add('active');
  AGENTS.forEach((a,i)=>{
    const seat=document.getElementById(`seat-${i}`);
    if(seat) seat.textContent=a.emoji;
  });
  logs.push({time:now(),msg:`🗣️ 老闆召集會議：${reason}`});
  comms.push({time:now(),from:'老闆 Boss',to:'全體',msg:`集合開會！${reason}`});
  renderPanel();
}

// ══════════════════════════════════════
// PANEL
// ══════════════════════════════════════
function renderPanel(){
  const c=document.getElementById('content');

  if(activeTab==='tasks'){
    c.innerHTML = tasks.length ? tasks.map(t=>`
      <div class="card">
        <div class="card-head">
          <span class="card-title">${(AGENTS.find(a=>a.id===t.agent)||{emoji:'📥'}).emoji} ${t.title}</span>
          <span class="badge badge-${t.status}">${t.status==='active'?'進行中':t.status==='done'?'✅ 完成':'⏳ 待處理'}</span>
        </div>
        <div class="card-body">${t.desc||''}</div>
      </div>
    `).join('') : '<div class="empty">暫無任務<br><br>👇 點左下角按鈕<br>跟老闆派任務</div>';

  } else if(activeTab==='outputs'){
    c.innerHTML = outputs.length ? outputs.map(o=>`
      <div class="card">
        <div class="card-head">
          <span class="card-title"><span class="tag tag-${o.type}">${o.typeLabel}</span>${o.title}</span>
        </div>
        <div class="card-body">${o.desc||''}</div>
        ${o.link?`<div style="margin-top:8px"><a href="${o.link}" target="_blank">📎 查看成果 →</a></div>`:''}
        <div style="color:var(--dim);font-size:8px;margin-top:8px">${o.time} — ${o.agent}</div>
      </div>
    `).join('') : '<div class="empty">暫無成果<br><br>任務完成後會顯示在這裡</div>';

  } else if(activeTab==='comms'){
    c.innerHTML = comms.length ? comms.slice(-60).reverse().map(c=>`
      <div class="log-line">
        <span class="log-time">${c.time}</span>
        <span class="from">${c.from}</span>
        <span class="arrow">→</span>
        <span class="to">${c.to}</span>
        <div style="color:var(--text);margin-top:4px">${c.msg}</div>
      </div>
    `).join('') : '<div class="empty">暫無通訊</div>';

  } else if(activeTab==='log'){
    c.innerHTML = logs.length ? logs.slice(-60).reverse().map(l=>`
      <div class="log-line">
        <span class="log-time">${l.time}</span>
        <span>${l.msg}</span>
      </div>
    `).join('') : '<div class="empty">暫無紀錄</div>';
  }
}

function refreshDesk(id){
  // Remove old desk, rebuild
  const old=document.getElementById(`desk-${id}`);
  if(old) old.remove();
  const a=AGENTS.find(x=>x.id===id);
  const s=state[id];
  const working=s.status==='working';
  const office=document.getElementById('office');

  const desk=document.createElement('div');
  desk.className=`desk ${working?'working':''}`;
  desk.id=`desk-${id}`;
  desk.style.left=a.pos.left;
  desk.style.top=a.pos.top;
  desk.innerHTML=`
    <div class="bubble">${s.task||''}</div>
    <div class="desk-body">
      <div class="lamp ${working?'on':''}"></div>
      <div class="monitor"><div class="monitor-screen ${working?'on':''}">${working?'▮▮▯':'·'}</div></div>
      <div class="char-container"><canvas class="char-canvas" id="cv-${id}"></canvas></div>
    </div>
    <div class="nameplate">${a.emoji} ${a.name}</div>
  `;
  office.appendChild(desk);
  requestAnimationFrame(()=>{
    const cv=document.getElementById(`cv-${id}`);
    if(cv) drawAgent(cv,a,working);
  });
  updateStats();
  renderPanel();
}
